<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProAgent AI: 스포츠 매니지먼트 플랫폼</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      font-family: Arial, sans-serif;
      color: #333;
    }
    .container {
      width: min(950px, 94%);
      margin: 40px auto;
      background: #ffffff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }
    h1 { margin: 0 0 8px; text-align: center; font-size: 28px; color: #1a2a6c; }
    .subtitle { text-align: center; color: #666; margin-bottom: 28px; font-size: 14px; }
    
    /* 인증 박스 */
    .auth-box { max-width: 420px; margin: 40px auto; display: flex; flex-direction: column; gap: 12px; }
    input, textarea, select {
      height: 46px; padding: 0 14px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; outline: none;
    }
    textarea { min-height: 100px; padding: 12px; resize: vertical; font-family: Arial, sans-serif; }
    input:focus, textarea:focus, select:focus { border-color: #1a2a6c; box-shadow: 0 0 0 3px rgba(26, 42, 108, 0.15); }
    
    /* 버튼 스타일 */
    button {
      border: none; border-radius: 12px; padding: 0 18px; height: 46px; font-size: 15px; cursor: pointer;
      transition: 0.15s; font-weight: bold;
    }
    button:hover { transform: translateY(-2px); opacity: 0.9; }
    button:disabled { cursor: not-allowed; opacity: 0.6; transform: none; }
    
    .btn-primary { background: #1a2a6c; color: white; }
    .btn-secondary { background: #7e57c2; color: white; }
    .btn-success { background: #43a047; color: white; }
    .btn-danger { background: #e53935; color: white; }
    .btn-dark { background: #455a64; color: white; }
    
    /* 레이아웃 구조 */
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; padding: 14px; border-radius: 16px; background: #f7f9fb; }
    .agent-form { display: grid; grid-template-columns: 1fr 2fr; gap: 12px; margin-bottom: 20px; }
    .full-width { grid-column: span 2; }
    
    /* 답변 영역 */
    .answer-section { margin-top: 20px; padding: 18px; border-radius: 18px; background: #f0f4c3; border: 1px solid #d4e157; }
    .answer-box { min-height: 120px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; font-weight: 500; }
    
    /* 오디오 플레이어 상자 */
    .audio-box { margin-top: 12px; display: flex; items-center: center; gap: 10px; }
    audio { height: 40px; }

    /* 리스트 영역 */
    .status { min-height: 24px; margin: 14px 0; color: #666; font-size: 14px; font-style: italic; }
    .list-title { font-size: 20px; font-weight: bold; margin-top: 30px; border-bottom: 2px solid #1a2a6c; padding-bottom: 8px; }
    .list { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
    .item { padding: 16px; border-radius: 16px; background: #f7f9fb; border: 1px solid #edf1f5; position: relative; }
    .item-title { margin: 0 0 6px; font-size: 18px; font-weight: bold; color: #1a2a6c; }
    .item-content { margin: 0; color: #444; line-height: 1.6; white-space: pre-wrap; }
    .item-date { margin-top: 8px; font-size: 12px; color: #999; }
    .delete-btn { position: absolute; right: 16px; top: 16px; padding: 0 12px; height: 32px; font-size: 13px; }
    
    .hidden { display: none; }
    .notice { max-width: 420px; margin: 20px auto; padding: 12px; border-radius: 12px; background: #fff8e1; color: #6d4c41; font-size: 13px; text-align: center; }
  </style>
</head>
<body>

  <div class="container">
    <h1>ProAgent AI</h1>
    <div class="subtitle">스포츠 에이전트 전용 선수 가치 분석 및 협상 멘트 생성기</div>

    <!-- 1단계: 로그인 / 회원가입 섹션 -->
    <section id="authSection">
      <div class="auth-box">
        <h3 style="text-align: center; margin-bottom: 10px;">에이전트 로그인</h3>
        <input id="emailInput" type="email" placeholder="에이전트 이메일 계정" />
        <input id="passwordInput" type="password" placeholder="비밀번호 (6자리 이상)" />
        <button class="btn-primary" id="loginBtn">로그인</button>
        <button class="btn-secondary" id="signupBtn">에이전시 등록 (회원가입)</button>
      </div>
      <div class="notice">처음 접속 시 회원가입을 먼저 진행해 주세요.</div>
    </section>

    <!-- 2단계: 메인 에이전트 대시보드 (로그인 후 표시) -->
    <section id="mainSection" class="hidden">
      <div class="top-bar">
        <div class="user-info">담당 에이전트: <strong id="userEmail" style="color:#1a2a6c;"></strong></div>
        <button class="btn-dark" id="logoutBtn">로그아웃</button>
      </div>

      <!-- 선수 데이터 입력 창 -->
      <div class="agent-form">
        <div>
          <label style="font-weight:bold; display:block; margin-bottom:5px;">선수 이름</label>
          <input id="playerNameInput" type="text" placeholder="예: 손흥민, 김민재" style="width:100%;" />
        </div>
        <div>
          <label style="font-weight:bold; display:block; margin-bottom:5px;">협상 목적 (마케팅 컨셉)</label>
          <select id="marketGoal" style="width:100%;">
            <option value="구단 연봉 협상용 세일즈 피치">구단 연봉 협상용 강력한 세일즈 피치</option>
            <option value="대기업 스폰서십 유치 홍보 문구">대기업 브랜드 스폰서십 유치용 마케팅 문구</option>
            <option value="이적 시장 홍보용 브리핑 리포트">유럽 이적 시장 제안용 스카우팅 리포트 요약</option>
          </select>
        </div>
        <div class="full-width">
          <label style="font-weight:bold; display:block; margin-bottom:5px;">최근 경기 지표 및 활약상 (경영/분석 데이터)</label>
          <textarea id="playerStatsInput" placeholder="선수의 경영적 가치를 증명할 기록을 입력하세요.&#10;예: 최근 5경기 4골 2도움, 경기당 활동량 11.5km, 패스 성공률 91% 기록 중. 유니폼 판매량 전월 대비 25% 상승함."></textarea>
        </div>
        <div class="full-width" style="text-align: right;">
          <button class="btn-primary" id="askBtn" style="width: 200px;">가치 분석 보고서 생성</button>
        </div>
      </div>

      <!-- AI 분석 결과 출력 및 TTS 리허설 기능 -->
      <div id="answerSection" class="answer-section hidden">
        <h4 style="margin: 0 0 10px 0; color: #558b2f;">📊 AI 에이전트 가치 분석 보고서</h4>
        <div id="answerBox" class="answer-box">리포트를 작성하는 중입니다...</div>
        
        <!-- TTS 오디오 재생 영역 -->
        <div class="audio-box">
          <button class="btn-secondary" id="ttsBtn">🎙️ 음성 브리핑 시작 (TTS)</button>
          <div id="audioContainer"></div>
        </div>
      </div>

      <div id="status" class="status"></div>

      <!-- 실시간 저장된 리포트 히스토리 목록 (Firestore 대용 Realtime DB) -->
      <div class="list-title">📋 관리 선수 협상 리포트 히스토리</div>
      <div id="dataList" class="list"></div>
    </section>
  </div>

  <!-- 라이브러리 스크립트 연결 (수업 파일에 있던 버전 그대로 사용) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getDatabase, ref, push, set, remove, onValue, off } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    // [수업 파일에서 가져온 설정값]
    const firebaseConfig = {
      apiKey: 'AIzaSyDO-v52Ehwphh5gW0WBzu9_DliMhOzy4Yo',
      authDomain: 'kang-f4e85.firebaseapp.com',
      databaseURL: 'https://kang-f4e85-default-rtdb.firebaseio.com',
      projectId: 'kang-f4e85',
      storageBucket: 'kang-f4e85.firebasestorage.app',
      messagingSenderId: '107057126084',
      appId: '1:107057126084:web:30f7bcb3f25dd2aa4a0791',
      measurementId: 'G-DJ52YTYQZM'
    };

    // [수업 파일에서 가져온 OpenAI 경유 Apps Script 주소]
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyTS-n6dNxhXGHxck-BL97z9l2PPrqZbl0tqjtPIP44MVFtyOiTwizk4jva8GMuV38p/exec';

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    // DOM 요소 선택
    const authSection = document.getElementById('authSection');
    const mainSection = document.getElementById('mainSection');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userEmail = document.getElementById('userEmail');
    
    const playerNameInput = document.getElementById('playerNameInput');
    const marketGoal = document.getElementById('marketGoal');
    const playerStatsInput = document.getElementById('playerStatsInput');
    const askBtn = document.getElementById('askBtn');
    const answerSection = document.getElementById('answerSection');
    const answerBox = document.getElementById('answerBox');
    const ttsBtn = document.getElementById('ttsBtn');
    const audioContainer = document.getElementById('audioContainer');
    
    const dataList = document.getElementById('dataList');
    const statusBox = document.getElementById('status');

    let currentUser = null;
    let currentItemsRef = null;
    let generatedReportText = ""; // TTS에 보낼 글로벌 텍스트 저장용

    function setStatus(message) { statusBox.textContent = message; }

    // --- 1. 회원가입 및 로그인 제어 (수업 코드 응용) ---
    signupBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim(); const password = passwordInput.value.trim();
      if(!email || !password) return alert('이메일과 비밀번호를 입력하세요.');
      try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert('에이전시 계정 등록 완료!');
      } catch (error) { alert('등록 실패: ' + error.message); }
    });

    loginBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim(); const password = passwordInput.value.trim();
      if(!email || !password) return alert('이메일과 비밀번호를 입력하세요.');
      try { await signInWithEmailAndPassword(auth, email, password); } 
      catch (error) { alert('로그인 실패: 이메일 또는 비밀번호를 확인하세요.'); }
    });

    logoutBtn.addEventListener('click', async () => { try { await signOut(auth); } catch(e) {} });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        authSection.classList.add('hidden');
        mainSection.classList.remove('hidden');
        userEmail.textContent = user.email;
        startRealtimeListener(user.uid);
      } else {
        currentUser = null;
        authSection.classList.remove('hidden');
        mainSection.classList.add('hidden');
        if(currentItemsRef) off(currentItemsRef);
      }
    });

    // --- 2. 실시간 데이터베이스 연동 (수업 코드 응용) ---
    function startRealtimeListener(uid) {
      setStatus('선수 히스토리 로드 중...');
      currentItemsRef = ref(database, `users/${uid}/sports_reports`);
      onValue(currentItemsRef, (snapshot) => {
        renderData(snapshot.val());
        setStatus('데이터 동기화 완료');
      });
    }

    // --- 3. ChatGPT 연동하여 스포츠 에이전트 리포트 작성 ---
    askBtn.addEventListener('click', async () => {
      const pName = playerNameInput.value.trim();
      const pGoal = marketGoal.value;
      const pStats = playerStatsInput.value.trim();

      if(!pName || !pStats) {
        alert('선수 이름과 활약상 데이터를 입력해 주세요.');
        return;
      }

      // 경영학적 가치를 담기 위한 강력한 프롬프트 조립
      const systemPrompt = `너는 스포츠 경영학과 마케팅을 전공한 전문 스포츠 에이전트야. 다음 선수 정보를 바탕으로 [${pGoal}] 목적에 맞는 브리핑 문구를 격식 있고 설득력 있게 작성해 줘. 선수의 경기 지표적 가치뿐만 아니라 구단의 비즈니스 및 마케팅적 이점도 함께 강조해 줘.`;
      const fullQuestion = `${systemPrompt}\n\n선수 이름: ${pName}\n지표 및 활약상: ${pStats}`;

      try {
        askBtn.disabled = true;
        askBtn.textContent = '분석 리포트 생성 중...';
        answerSection.classList.remove('hidden');
        answerBox.textContent = '스포츠 비즈니스 데이터를 분석하여 리포트를 작성하는 중입니다...';
        audioContainer.innerHTML = ''; // 이전 오디오 초기화

        // 수업시간에 쓴 Apps Script 경로로 POST 요청
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ question: fullQuestion })
        });
        const data = await response.json();
        
        if (data.error) throw new Error(data.error);

        generatedReportText = data.answer || '답변을 가져오지 못했습니다.';
        answerBox.textContent = generatedReportText;
        askBtn.textContent = '가치 분석 보고서 생성';
        askBtn.disabled = false;

        // 생성 성공 시 Firebase Realtime DB에 자동 저장 (제목: 선수이름, 내용: 생성된 리포트)
        const itemsRef = ref(database, `users/${currentUser.uid}/sports_reports`);
        const newItemRef = push(itemsRef);
        await set(newItemRef, {
          title: `[${pName}] ${pGoal}`,
          content: generatedReportText,
          createdAt: new Date().toLocaleString('ko-KR')
        });

      } catch (error) {
        console.error(error);
        answerBox.textContent = '리포트 생성 중 오류가 발생했습니다: ' + error.message;
        askBtn.textContent = '가치 분석 보고서 생성';
        askBtn.disabled = false;
      }
    });

    // --- 4. Web Speech API (내장 TTS) 기능을 활용한 음성 브리핑 리허설 ---
    // (수업 파일의 OpenAI TTS는 API Key 보안상 우회해야 하므로 브라우저 내장 기능을 통해 확실하게 소리가 나도록 연동함)
    ttsBtn.addEventListener('click', () => {
      if(!generatedReportText) {
        alert('생성된 분석 리포트가 없습니다.');
        return;
      }
      
      // 혹시 이미 읽고 있다면 취소
      window.speechSynthesis.cancel();

      // 브라우저 내장 TTS 객체 생성
      const speech = new SpeechSynthesisUtterance(generatedReportText);
      speech.lang = 'ko-KR'; // 한국어 설정
      speech.rate = 1.0;     // 속도 조절

      setStatus('🎙️ AI 에이전트 음성 브리핑 실행 중...');
      window.speechSynthesis.speak(speech);
      
      speech.onend = () => { setStatus('음성 브리핑 완료'); };
    });

    // --- 5. 데이터 목록 렌더링 및 삭제 기능 (수업 코드 응용) ---
    function renderData(data) {
      dataList.innerHTML = '';
      if (!data) {
        dataList.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">아직 등록된 협상 리포트가 없습니다.</div>';
        return;
      }
      Object.entries(data).reverse().forEach(([id, item]) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <p class="item-title">${escapeHTML(item.title || '')}</p>
          <p class="item-content">${escapeHTML(item.content || '')}</p>
          <div class="item-date">작성일: ${item.createdAt || '-'}</div>
          <button class="btn-danger delete-btn" onclick="deleteReport('${id}')">삭제</button>
        `;
        dataList.appendChild(div);
      });
    }

    // 전역 삭제 함수 바인딩
    window.deleteReport = async function(id) {
      if (!currentUser || !confirm('이 리포트를 삭제하시겠습니까?')) return;
      try {
        await remove(ref(database, `users/${currentUser.uid}/sports_reports/${id}`));
      } catch (error) { alert('삭제 실패'); }
    };

    function escapeHTML(text) {
      return String(text).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;');
    }
  </script>
</body>
</html>
